{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto px-6 py-24">
    <div class="text-center mb-10">
        <h1 class="font-serif text-3xl font-bold mb-2">Вход</h1>
        <p class="text-gray-400 text-sm">Через Telegram бот</p>
    </div>

    <div id="login-form">
        <!-- Steps -->
        <div class="mb-8 space-y-4">
            <div class="flex gap-4 items-start">
                <span class="flex-shrink-0 w-7 h-7 rounded-full bg-gray-900 text-white text-xs flex items-center justify-center font-medium">1</span>
                <p class="text-sm text-gray-600 pt-0.5">Откройте Telegram и отправьте <code class="text-xs bg-gray-100 px-1.5 py-0.5 rounded">/login</code> боту <a href="https://t.me/iacob_blog_bot" target="_blank" class="underline underline-offset-4">@iacob_blog_bot</a></p>
            </div>
            <div class="flex gap-4 items-start">
                <span class="flex-shrink-0 w-7 h-7 rounded-full bg-gray-900 text-white text-xs flex items-center justify-center font-medium">2</span>
                <p class="text-sm text-gray-600 pt-0.5">Введите полученный код ниже</p>
            </div>
        </div>

        <!-- Code form -->
        <form hx-post="/api/v1/auth/verify-by-code"
              hx-target="#login-form"
              hx-swap="innerHTML"
              class="space-y-4">
            {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
            {% endif %}
            <div>
                <input type="text"
                       id="code"
                       name="code"
                       placeholder="ABC12345"
                       pattern="[A-Z0-9]{8}"
                       maxlength="8"
                       class="w-full px-6 py-4 bg-gray-50 border-0 rounded-2xl focus:ring-2 focus:ring-gray-900 text-center text-2xl tracking-[0.3em] uppercase font-mono"
                       required>
            </div>
            <button type="submit"
                    class="w-full bg-gray-900 text-white py-4 rounded-full font-medium hover:bg-gray-700 transition">
                Войти
            </button>
        </form>
    </div>
</div>
{% endblock %}
