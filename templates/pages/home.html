{% extends "base.html" %}

{% block title %}Главная{% endblock %}

{% block content %}
<!-- Hero Section -->
<section class="relative overflow-hidden">
    <div class="max-w-6xl mx-auto px-6 py-16 md:py-24">
        <div class="flex flex-col md:flex-row items-center gap-12">
            <!-- Text -->
            <div class="flex-1 text-center md:text-left">
                <p class="text-sm font-medium text-gray-400 uppercase tracking-widest mb-4">Персональный блог</p>
                <h1 class="font-serif text-4xl sm:text-5xl md:text-6xl font-bold leading-tight mb-6">
                    {{ hero.title }}
                </h1>
                <p class="text-lg text-gray-500 max-w-lg mx-auto md:mx-0 leading-relaxed">
                    {{ hero.subtitle }}
                </p>
                <div class="mt-8 flex flex-wrap gap-4 justify-center md:justify-start">
                    <a href="/gallery" class="bg-gray-900 text-white px-7 py-3 rounded-full text-sm font-medium hover:bg-gray-700 transition">
                        Смотреть работы
                    </a>
                    <a href="#posts" class="border border-gray-300 px-7 py-3 rounded-full text-sm font-medium text-gray-600 hover:border-gray-900 hover:text-gray-900 transition">
                        Читать блог
                    </a>
                </div>
            </div>
            <!-- Avatar -->
            <div class="flex-shrink-0">
                <img src="/static/{{ hero.avatar }}"
                     alt="Якоб"
                     class="w-48 h-48 md:w-64 md:h-64 rounded-2xl object-cover shadow-2xl shadow-gray-200">
            </div>
        </div>
    </div>
</section>

<!-- Latest Posts Section -->
<section id="posts" class="max-w-6xl mx-auto px-6 py-16">
    <div class="flex items-end justify-between mb-10">
        <div>
            <p class="text-sm font-medium text-gray-400 uppercase tracking-widest mb-2">Блог</p>
            <h2 class="font-serif text-3xl font-bold">Последние записи</h2>
        </div>
    </div>

    <!-- Posts loaded via htmx -->
    <div id="posts-container"
         hx-get="/partials/posts"
         hx-trigger="load"
         hx-swap="innerHTML">
        <div class="flex justify-center py-16">
            <div class="animate-spin rounded-full h-8 w-8 border-2 border-gray-900 border-t-transparent"></div>
        </div>
    </div>
</section>
{% endblock %}
