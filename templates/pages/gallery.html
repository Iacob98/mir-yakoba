{% extends "base.html" %}

{% block title %}Галерея{% endblock %}

{% block content %}
<section class="max-w-6xl mx-auto px-6 py-16">
    <div class="text-center mb-16">
        <p class="text-sm font-medium text-gray-400 uppercase tracking-widest mb-3">Фотографии</p>
        <h1 class="font-serif text-4xl sm:text-5xl font-bold mb-4">Галерея</h1>
        <p class="text-gray-500 max-w-md mx-auto">Все изображения из публикаций</p>
    </div>

    {% if images %}
    <div class="masonry">
        {% for img in images %}
        <a href="{% if img.post %}/posts/{{ img.post.slug }}{% else %}#{% endif %}" class="group block mb-4">
            <div class="relative overflow-hidden rounded-2xl bg-gray-100">
                <img src="/uploads/{{ img.file_path }}"
                     alt="{{ img.original_name }}"
                     class="w-full object-cover group-hover:scale-105 transition duration-500"
                     loading="lazy">
            </div>
        </a>
        {% endfor %}
    </div>
    {% else %}
    <div class="text-center py-20">
        <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-gray-50 flex items-center justify-center">
            <svg class="w-8 h-8 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
        </div>
        <p class="text-gray-400 text-lg">Фотографий пока нет</p>
    </div>
    {% endif %}
</section>
{% endblock %}
