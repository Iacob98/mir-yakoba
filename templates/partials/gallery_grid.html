{% if posts %}
{% for post in posts %}
<a href="/posts/{{ post.slug }}" class="group block mb-4">
    <div class="relative overflow-hidden rounded-2xl bg-gray-100">
        {% if post.featured_image %}
        <img src="{{ post.featured_image }}"
             alt="{{ post.title }}"
             class="w-full object-cover group-hover:scale-105 transition duration-500"
             loading="lazy">
        {% else %}
        <div class="aspect-square flex items-center justify-center bg-gradient-to-br from-gray-100 to-gray-200">
            <span class="text-5xl text-gray-300 font-serif">{{ post.title[0] }}</span>
        </div>
        {% endif %}
        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/40 transition duration-300 flex items-end">
            <div class="p-5 translate-y-4 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition duration-300">
                <h3 class="text-white font-bold text-lg leading-tight">{{ post.title }}</h3>
                {% if post.excerpt %}
                <p class="text-white/70 text-sm mt-1 line-clamp-2">{{ post.excerpt }}</p>
                {% endif %}
            </div>
        </div>
    </div>
</a>
{% endfor %}

{% if has_more %}
<div hx-get="/partials/gallery?page={{ next_page }}"
     hx-trigger="revealed"
     hx-swap="outerHTML"
     class="flex justify-center py-8 col-span-full">
    <div class="animate-spin h-6 w-6 border-2 border-gray-900 border-t-transparent rounded-full"></div>
</div>
{% endif %}
{% endif %}
